<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="6" fill="#0d1117"/>
  <!-- Blade (tapers to a point at top) -->
  <polygon points="16,2 14.2,21 17.8,21" fill="#4dd9c0"/>
  <!-- Blade center shine -->
  <polygon points="16,3 15.8,10 16.2,10" fill="#81e6d9"/>
  <!-- Guard -->
  <rect x="9" y="21" width="14" height="2.5" rx="1.2" fill="#2db8a0"/>
  <!-- Grip -->
  <rect x="14.5" y="23.5" width="3" height="5" rx="1" fill="#4dd9c0"/>
  <!-- Pommel -->
  <circle cx="16" cy="30" r="1.8" fill="#2db8a0"/>
</svg>
